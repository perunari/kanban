version: '3.9'

# ============================================================
# セキュリティ警告
# ============================================================
# このアプリは社内ネットワーク限定での使用を前提としています。
#
# VITE_API_KEY は Vite ビルド時に JavaScript バンドルへ静的に
# 埋め込まれるため、インターネットへの公開は禁止です。
#
# 必ず以下のいずれかのネットワーク境界保護を実施してください:
#   - VPN によるアクセス制限
#   - ファイアウォール / リバースプロキシによる IP 制限
#   - インターネット非到達のプライベートサブネットへの配置
#
# 詳細は SECURITY.md を参照してください。
# ============================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - kanban-db:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_PATH=/app/data/kanban.db
      - API_KEY=${API_KEY:?API_KEY is required}
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_API_KEY=${API_KEY:?API_KEY is required}
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  kanban-db:
