version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - kanban-db:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_PATH=/app/data/kanban.db
      - API_KEY=${API_KEY:?API_KEY is required}
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_API_KEY=${API_KEY:?API_KEY is required}
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  kanban-db:
